<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>quizHub — Apresentador</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
.hwrap{max-width:1000px;margin:0 auto;padding:24px}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.qcard{background:var(--card);border-radius:18px;box-shadow:var(--shadow-sm);overflow:hidden;border:1px solid var(--line);display:flex;flex-direction:column}
.qcard .thumb{height:100px;display:flex;align-items:flex-end;padding:14px}
.qcard .thumb .count{background:rgba(0,0,0,.28);color:#fff;font-weight:800;font-size:12.5px;padding:5px 11px;border-radius:999px}
.qcard .b{padding:15px 16px}
.qcard .b h3{font-size:18px;margin-bottom:4px}.qcard .b p{color:var(--muted);font-size:13.5px;font-weight:600}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}

/* ===== editor de quiz ===== */
.creator{display:grid;grid-template-columns:300px 1fr;gap:0;min-height:calc(100vh - 0px)}
.q-list{background:var(--card);border-right:1px solid var(--line);padding:18px;display:flex;flex-direction:column;gap:10px;overflow:auto;max-height:100vh;position:sticky;top:0}
.q-list .qli{display:flex;gap:11px;align-items:center;padding:11px;border-radius:13px;border:2px solid transparent;cursor:pointer;transition:.12s}
.q-list .qli:hover{background:var(--bg)}
.q-list .qli.active{border-color:var(--brand2);background:#FCF4FA}
.qli .num{width:26px;height:26px;border-radius:8px;background:var(--ink);color:#fff;font-weight:800;font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.qli .meta{min-width:0}
.qli .meta .t{font-weight:800;font-size:13.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.qli .meta .s{font-size:11.5px;color:var(--muted);font-weight:700}
.qli .ico{flex-shrink:0;font-size:16px}
.editor{padding:26px 30px;overflow:auto;max-height:100vh}
.editor-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;gap:12px;flex-wrap:wrap}
.field{margin-bottom:18px}
.field label{display:block;font-weight:800;font-size:13px;color:var(--muted);margin-bottom:7px;text-transform:uppercase;letter-spacing:.4px}
.q-input{width:100%;font-family:var(--disp);font-weight:500;font-size:24px;padding:18px 20px;border-radius:16px;border:2px solid var(--line);background:var(--card);text-align:center;transition:.12s}
.q-input:focus{outline:none;border-color:var(--brand2)}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row>*{flex:1;min-width:140px}
.ans-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:6px}
.ans-edit{display:flex;align-items:center;gap:12px;padding:14px 16px;border-radius:16px;color:#fff;position:relative}
.ans-edit .shape{width:26px;height:26px;flex-shrink:0}
.ans-edit input{flex:1;background:rgba(255,255,255,.18);border:none;color:#fff;font-weight:800;font-size:16px;padding:9px 12px;border-radius:9px}
.ans-edit input::placeholder{color:rgba(255,255,255,.65)}
.ans-edit input:focus{outline:2px solid rgba(255,255,255,.6)}
.ans-edit .corr{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.18);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:.12s}
.ans-edit .corr.on{background:#fff;color:var(--good)}
.ans-edit .corr svg{width:18px;height:18px}
.opt-line{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.opt-line .dot{width:16px;height:16px;border-radius:5px;flex-shrink:0}
.opt-line .inp{flex:1}
.opt-line .rm{width:34px;height:34px;border-radius:10px;background:var(--bg);color:var(--muted);font-size:18px;flex-shrink:0}
.opt-line .rm:hover{background:#FBE8EE;color:var(--bad)}
.help{font-size:13px;color:var(--muted);font-weight:600;margin-top:6px;line-height:1.45}
.tag-list{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.tag{display:inline-flex;align-items:center;gap:7px;background:var(--line);color:var(--brand1);font-weight:800;font-size:13.5px;padding:7px 13px;border-radius:999px}
.tag button{color:var(--brand1);opacity:.6;font-size:16px;line-height:1}
.tag button:hover{opacity:1}
.media-box{border:2px dashed var(--line);border-radius:16px;padding:18px;text-align:center;color:var(--muted);font-weight:700}
.media-box.has{border-style:solid;border-color:var(--brand2);color:var(--text)}

/* ---------- add question modal ---------- */
.modal-bg{position:fixed;inset:0;background:rgba(27,18,48,.55);backdrop-filter:blur(4px);z-index:60;display:flex;align-items:flex-end;justify-content:center;animation:floatUp .2s ease}
.modal{background:var(--card);border-radius:26px 26px 0 0;width:100%;max-width:720px;max-height:86vh;overflow:auto;padding:24px 26px 34px}
@media(min-width:720px){.modal-bg{align-items:center}.modal{border-radius:26px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;position:sticky;top:-2px;background:var(--card);padding-top:4px}
.modal-head h2{font-size:22px}
.mclose{width:40px;height:40px;border-radius:50%;background:var(--bg);font-size:20px;display:flex;align-items:center;justify-content:center}
.group-h{font-family:var(--disp);font-weight:600;font-size:16px;color:var(--text);margin:18px 0 12px}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(min-width:560px){.type-grid{grid-template-columns:1fr 1fr 1fr}}
.type-card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:16px 12px;text-align:center;transition:.13s;display:flex;flex-direction:column;align-items:center;gap:9px}
.type-card:hover{border-color:var(--brand2);transform:translateY(-3px);box-shadow:var(--shadow-sm)}
.type-card .ti{width:50px;height:50px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px}
.type-card .tn{font-weight:800;font-size:13.5px;line-height:1.15}
.type-card .td{font-size:11px;color:var(--muted);font-weight:700}

/* editor responsivo */
.ed-topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:30;flex-wrap:wrap}
.q-list .qli .del-q{margin-left:auto;opacity:.4;font-size:14px}
.q-list .qli:hover .del-q{opacity:.9}
@media(max-width:760px){
  .creator{grid-template-columns:1fr}
  .q-list{position:static;max-height:none;flex-direction:row;overflow-x:auto;border-right:none;border-bottom:1px solid var(--line)}
  .q-list .qli{flex-direction:column;min-width:90px;text-align:center}
  .ans-grid{grid-template-columns:1fr}
  .editor{padding:20px 16px}
}

</style>
</head>
<body>
<div id="root"></div>
<input type="file" id="importFile" accept="application/json" class="hide">
<script src="/socket.io/socket.io.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/host.js"></script>
</body>
</html>
