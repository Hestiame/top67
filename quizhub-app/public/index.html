<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>quizHub — Entrar</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/style.css">
<style>
body{background:linear-gradient(160deg,#6C2BD9,#9B4DFF 50%,#FF3D81)}
#root{min-height:100vh}
.join-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;color:#fff}
.join-card{background:#fff;color:var(--text);border-radius:24px;padding:26px 22px;width:100%;max-width:400px;box-shadow:0 20px 50px rgba(0,0,0,.3)}
.join-card h2{font-size:24px;margin-bottom:4px}
.join-card .step{margin-top:16px}
.avatar-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:8px}
.av-pick{aspect-ratio:1;border-radius:14px;background:var(--bg);padding:0;overflow:hidden;display:flex;align-items:center;justify-content:center;border:3px solid transparent;transition:.12s}
.av-pick img{width:100%;height:100%;object-fit:cover;display:block}
.av-pick:hover{background:var(--line)} .av-pick.sel{border-color:var(--brand2);transform:scale(1.05)}
.brand-top{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.brand-top .brand-name{color:#fff}.brand-top .brand-name b{color:#FFD86B}
.jl{font-weight:800;font-size:13px;color:var(--muted)}
.join-card{max-height:92vh;overflow:auto}
.acc-sec{margin-top:10px}
.acc-sec-h{font-weight:800;font-size:12px;color:var(--muted);margin-bottom:6px}
.acc-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px}
.acc-pick{flex:0 0 auto;width:54px;height:54px;border-radius:12px;background:var(--bg);border:3px solid transparent;display:flex;align-items:center;justify-content:center;font-size:20px;color:var(--muted);overflow:hidden;transition:.12s}
.acc-pick img{width:100%;height:100%;object-fit:contain}
.acc-pick.sel{border-color:var(--brand2);transform:scale(1.05)}
</style>
</head>
<body>
<div id="root"></div>
<script src="/socket.io/socket.io.js"></script>
<script src="/js/shared.js"></script>
<script src="/js/player.js"></script>
</body>
</html>
